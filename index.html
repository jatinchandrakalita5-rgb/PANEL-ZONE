<!DOCTYPE html>

<html>
<head>
<title>LOGIQUE LOGIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* 🌈 RGB GLOW BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet);
  background-size: 400%;
  animation: rgb 12s linear infinite;
  z-index: -1;
  filter: blur(100px);
}

@keyframes rgb {
  0% { background-position: 0% }
  100% { background-position: 100% }
}

/* 🔳 LOGIN BOX */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  padding: 35px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

/* ✨ STYLISH TITLE */
.title {
  font-size: 40px;
  font-weight: bold;
}

.neon {
  color: cyan;
  text-shadow: 
    0 0 5px cyan,
    0 0 10px cyan,
    0 0 20px cyan,
    0 0 40px cyan;
}

.subtitle {
  font-size: 18px;
  letter-spacing: 3px;
  margin-bottom: 20px;
  color: #aaa;
}

/* 🧾 INPUTS */
input {
  padding: 12px;
  margin: 10px;
  width: 220px;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* 🔘 BUTTON */
button {
  padding: 12px;
  width: 100%;
  background: black;
  color: cyan;
  border: 1px solid cyan;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
}

button:hover {
  background: cyan;
  color: black;
  box-shadow: 0 0 15px cyan;
}

label {
  font-size: 14px;
}

#verifyBox {
  display: none;
  margin-top: 20px;
  color: cyan;
}
</style>

</head>

<body>

<div class="box">

  <!-- ✨ ONLY "LOGIQUE" HAS NEON -->

  <div class="title">
    <span class="neon">LOGIQUE</span> LOGIN
  </div>

  <div class="subtitle">SECURE ACCESS</div>

<input type="text" id="user" placeholder="Username"><br> <input type="password" id="pass" placeholder="Password"><br>

  <label>
    <input type="checkbox" id="remember"> Remember Me
  </label><br><br>

<button onclick="login()">LOGIN</button>

  <p id="msg"></p>

  <div id="verifyBox">
    <p>Verifying secure connection...</p>
    <p id="ray"></p>
  </div>

</div>

<script>

// LOAD SAVED DATA
window.onload = function() {
  let savedUser = localStorage.getItem("savedUser");
  let savedPass = localStorage.getItem("savedPass");

  if (savedUser && savedPass) {
    document.getElementById("user").value = savedUser;
    document.getElementById("pass").value = savedPass;
    document.getElementById("remember").checked = true;
  }
};

// GENERATE RAY ID
function generateRayID() {
  return Math.random().toString(36).substring(2, 10).toUpperCase();
}

// LOGIN FUNCTION
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;
  let remember = document.getElementById("remember").checked;

  if (u === "gullu" && p === "1") {

    document.getElementById("verifyBox").style.display = "block";
    document.getElementById("msg").innerHTML = "";

    document.getElementById("ray").innerHTML =
      "Ray ID: " + generateRayID();

    setTimeout(() => {

      if (remember) {
        localStorage.setItem("savedUser", u);
        localStorage.setItem("savedPass", p);
      } else {
        localStorage.removeItem("savedUser");
        localStorage.removeItem("savedPass");
      }

      // ✅ FIXED REDIRECT
      window.location.href = "dashboard.html";

    }, 2000);

  } else {
    document.getElementById("msg").innerHTML = "Wrong ❌";
  }
}

</script>

</body>
</html>
