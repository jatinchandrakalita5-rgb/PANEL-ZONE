<!DOCTYPE html>
<html>
<head>
<title>LOGIQUE LOGIN</title>
<style>
  body { margin: 0; font-family: Arial; background: black; color: white; overflow: hidden; }
  body::before {
    content: ""; position: fixed; width: 200%; height: 200%;
    background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%; animation: rgb 12s linear infinite; z-index: -1; filter: blur(100px);
  }
  @keyframes rgb { 0% { background-position: 0% } 100% { background-position: 100% } }

  .box {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px;
    text-align: center; box-shadow: 0 0 20px rgba(0,255,255,0.3); width: 320px;
  }
  .neon { color: cyan; text-shadow: 0 0 10px cyan; font-size: 40px; font-weight: bold; }
  
  input { padding: 12px; margin: 8px 0; width: 90%; border-radius: 8px; border: none; outline: none; background: #eee; }
  
  button {
    padding: 12px; width: 100%; background: black; color: cyan; border: 1px solid cyan;
    cursor: pointer; border-radius: 8px; transition: 0.3s; font-weight: bold; margin-top: 10px;
  }
  button:hover { background: cyan; color: black; box-shadow: 0 0 15px cyan; }
  
  .music-btn { border-color: #ff00ff; color: #ff00ff; }
  .music-btn:hover { background: #ff00ff; color: white; box-shadow: 0 0 20px #ff00ff; }

  #musicSection { display: none; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px; }
  #captchaDisplay { font-size: 28px; color: #ff00ff; font-weight: bold; margin-bottom: 5px; }
  .status-box { display: none; color: #0f0; font-size: 13px; margin-top: 10px; font-family: monospace; }
</style>
</head>
<body>

<div class="box">
  <div class="neon">LOGIQUE</div>
  <div style="letter-spacing:3px; color:#aaa; margin-bottom:15px;">SECURE ACCESS</div>

  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="loginDashboard()">LOGIN TO DASHBOARD</button>

  <div style="margin: 15px 0; color: #555;">— OR —</div>

  <button class="music-btn" onclick="toggleMusic()">ENTER MUSIC ZONE</button>

  <div id="musicSection">
    <div id="captchaDisplay"></div>
    <input type="text" id="musicCaptcha" placeholder="Enter 2-Digit Captcha" maxlength="2">
    <button class="music-btn" onclick="loginMusic()">VERIFY & ENTER MUSIC</button>
  </div>

  <p id="msg" style="color:red; font-size:12px; height: 15px;"></p>

  <div id="statusBox" class="status-box">
    <p id="statusTxt">Syncing Profile...</p>
    <p id="rayId"></p>
  </div>
</div>

<script>
let currentMusicCaptcha = "";

function generateMusicCaptcha() {
  // Generates exactly a 2-digit number
  currentMusicCaptcha = Math.floor(10 + Math.random() * 90).toString();
  document.getElementById("captchaDisplay").innerText = currentMusicCaptcha;
}

function toggleMusic() {
  document.getElementById("musicSection").style.display = "block";
  generateMusicCaptcha();
}

function showRayId(type, target) {
  const box = document.getElementById("statusBox");
  const ray = document.getElementById("rayId");
  const txt = document.getElementById("statusTxt");
  
  box.style.display = "block";
  txt.innerText = type === "dash" ? "Confirming Ray ID..." : "Cloud Syncing Music...";
  // Generates a confirmed Ray ID
  ray.innerText = "RAY ID: " + Math.random().toString(36).substring(2, 12).toUpperCase();

  setTimeout(() => {
    window.location.href = target;
  }, 2000);
}

function loginDashboard() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === "gullu" && p === "1") {
    // Redirects correctly to dashboard.html
    showRayId("dash", "dashboard.html");
  } else {
    document.getElementById("msg").innerText = "Wrong Credentials! ❌";
  }
}

function loginMusic() {
  const cap = document.getElementById("musicCaptcha").value;
  
  // Validates the 2-digit number captcha
  if(cap === currentMusicCaptcha) {
    // Redirects correctly to muicplayer.html
    showRayId("music", "muicplayer.html");
  } else {
    document.getElementById("msg").innerText = "Invalid Captcha! ❌";
    generateMusicCaptcha();
  }
}
</script>
</body>
</html>
